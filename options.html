<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PNU Auto Login Options</title>
  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #121a2f;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.11);
      --border: rgba(255, 255, 255, 0.14);
      --text: #eef2ff;
      --muted: #b8c3e0;
      --accent: #6ea8fe;
      --accent-strong: #3d7bfd;
      --danger: #ff7272;
      --success: #81d8a3;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.26);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(110, 168, 254, 0.22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(61, 123, 253, 0.18), transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .shell {
      width: min(760px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 26px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .meta {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .meta-card {
      border-radius: var(--radius-lg);
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .meta-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .meta-card span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .form-wrap {
      background: var(--panel-strong);
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 13px;
      font-weight: 700;
    }

    .input-shell {
      position: relative;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: rgba(110, 168, 254, 0.65);
      box-shadow: 0 0 0 4px rgba(110, 168, 254, 0.18);
      background: rgba(255, 255, 255, 0.08);
    }

    input::placeholder {
      color: #9eadcf;
    }

    .toggle-visibility {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .status {
      min-height: 50px;
      border-radius: var(--radius-md);
      padding: 13px 14px;
      font-size: 13px;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
    }

    .status.success {
      color: #dcffe8;
      border-color: rgba(129, 216, 163, 0.32);
      background: rgba(129, 216, 163, 0.10);
    }

    .status.error {
      color: #ffdcdc;
      border-color: rgba(255, 114, 114, 0.30);
      background: rgba(255, 114, 114, 0.10);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      flex: 1 1 220px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 16px 30px rgba(61, 123, 253, 0.25);
    }

    .ghost {
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.10);
      flex: 1 1 140px;
    }

    .danger {
      color: white;
      background: linear-gradient(135deg, #ff7b7b, #ff5e5e);
      flex: 1 1 140px;
    }

    .footnote {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .shell {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel hero">
      <h1>PNU Auto Login</h1>
      <p>
        최초 1회만 ID와 비밀번호를 저장하면,
        PLATO와 학지시에서 자동으로 로그인합니다.
      </p>

      <div class="meta">
        <div class="meta-card">
          <strong>필독</strong>
          <span>로그인 정보 저장 후 크롬 우측 상단 메뉴에서 토글 활성화 하고 사용하시면 됩니다.</span>
        </div>
      </div>
    </section>

    <section class="panel form-wrap">+
      <h2 class="section-title">계정 설정</h2>

      <form id="credentialsForm" novalidate>
        <div class="field">
          <label for="username">ID / 학번</label>
          <div class="input-shell">
            <input
              id="username"
              type="text"
              autocomplete="username"
              placeholder="ID / 학번을 입력하세요"
              required
            />
          </div>
        </div>

        <div class="field">
          <label for="password">비밀번호</label>
          <div class="input-shell">
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              placeholder="비밀번호를 입력하세요"
              required
            />
            <button id="toggleVisibility" class="toggle-visibility" type="button">표시</button>
          </div>
        </div>

        <div id="status" class="status">
          상태를 확인하는 중입니다.
        </div>

        <div class="actions">
          <button id="saveButton" class="primary" type="submit">암호화 저장</button>
          <button id="refreshButton" class="ghost" type="button">상태 새로고침</button>
          <button id="clearButton" class="danger" type="button">저장 정보 삭제</button>
        </div>

        <div class="footnote">
          저장 후 팝업에서 자동 로그인 토글을 켜면 동작합니다. 계정을 다시 저장하면
          이전 값은 교체됩니다.
        </div>
      </form>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
