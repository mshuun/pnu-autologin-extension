<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PNU Auto Login</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #eef2ff;
      --muted: #b6c0df;
      --accent: #6ea8fe;
      --accent-strong: #3d7bfd;
      --danger: #ff7272;
      --success: #75d39a;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 340px;
      min-height: 250px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(61, 123, 253, 0.25), transparent 42%),
        radial-gradient(circle at bottom right, rgba(110, 168, 254, 0.18), transparent 38%),
        linear-gradient(180deg, #0b1020 0%, #11182b 100%);
      padding: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .badge {
      align-self: center;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      white-space: nowrap;
    }

    .badge.on { color: var(--success); }
    .badge.off { color: var(--danger); }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 14px;
    }

    .switch-copy strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .switch-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .switch {
      position: relative;
      width: 58px;
      height: 34px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.16);
      transition: all 180ms ease;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.16);
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: white;
      transition: transform 180ms ease;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    }

    .switch input:checked + .slider {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      border-color: transparent;
    }

    .switch input:checked + .slider::before {
      transform: translateX(24px);
    }

    .notice {
      min-height: 44px;
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 12px;
      line-height: 1.5;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
    }

    .notice.warn {
      color: #ffd6d6;
      border-color: rgba(255, 114, 114, 0.28);
      background: rgba(255, 114, 114, 0.10);
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease, background 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      flex: 1;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 14px 28px rgba(61, 123, 253, 0.28);
    }

    .ghost {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.10);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="topbar">
      <div>
        <h1 class="title">PNU Auto Login</h1>
        <p class="subtitle">PLATO / 학지시 자동 로그인 토글</p>
      </div>
      <div id="statusBadge" class="badge off">OFF</div>
    </div>

    <section class="switch-row">
      <div class="switch-copy">
        <strong>자동 로그인</strong>
        <span>저장된 계정으로 로그인 페이지를 감지하면 자동으로 입력·제출합니다.</span>
      </div>

      <label class="switch" aria-label="자동 로그인 토글">
        <input id="toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </section>

    <div id="notice" class="notice">
      상태를 불러오는 중입니다.
    </div>

    <div class="actions">
      <button id="openOptions" class="primary" type="button">계정 설정 열기</button>
      <button id="refreshState" class="ghost" type="button">새로고침</button>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
